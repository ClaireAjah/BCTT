<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthSync - Dashboard Dokter</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard-layout">
        <nav class="navbar">
            <div class="navbar-brand">HealthSync Portal Dokter</div>
            <div class="user-info">
                <span class="user-name" id="userName">Loading...</span>
                <button class="btn-logout" id="btnLogout">Logout</button>
            </div>
        </nav>

        <div class="dashboard-container">
            <aside class="sidebar">
                <div class="card">
                    <h2 class="card-title">Manajemen</h2>
                    <ul class="list-group">
                        <li><button class="btn-outline" style="width:100%; text-align:left;" onclick="openModal('announcementModal')">Buat Pengumuman</button></li>
                        <li><button class="btn-outline" style="width:100%; text-align:left;" onclick="openModal('recordModal')">Input Rekam Medis</button></li>
                    </ul>
                </div>
            </aside>

            <main class="main-content">
                <div class="card">
                    <h2 class="card-title">Manajemen Janji Temu</h2>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Tanggal</th>
                                    <th>Pasien</th>
                                    <th>Keluhan</th>
                                    <th>Status</th>
                                    <th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="appointmentTableBody">
                                <tr><td colspan="5">Memuat...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="card">
                    <h2 class="card-title">Pantau Pasien (Telemonitoring)</h2>
                    <div class="form-group" style="display:flex; gap:10px;">
                        <select id="patientSelectSearch" style="flex:1;">
                            <option value="">Memuat data pasien...</option>
                        </select>
                        <button class="btn-primary" style="width:auto;" onclick="fetchPatientVitals()">Tampilkan Grafik</button>
                    </div>
                    <div class="chart-container">
                        <canvas id="vitalsChart"></canvas>
                    </div>
                </div>

                <div class="card">
                    <h2 class="card-title">Riwayat Rekam Medis (History)</h2>
                    <div class="form-group" style="margin-bottom:15px;">
                        <input type="text" id="recordFilter" placeholder="🔍 Cari berdasarkan nama pasien..." onkeyup="filterRecords()">
                    </div>
                    <ul class="list-group" id="recordsList">
                        <li class="list-item">Memuat riwayat rekam medis...</li>
                    </ul>
                </div>
            </main>
        </div>
    </div>

    <div id="announcementModal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('announcementModal')">&times;</button>
            <h2 class="card-title" style="margin-bottom: 20px;">Buat Pengumuman Medis</h2>
            <form id="announcementForm">
                <div class="form-group">
                    <label for="title">Judul Pengumuman</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label for="type">Kategori</label>
                    <select id="type" required>
                        <option value="info">Informasi Umum</option>
                        <option value="alert">Peringatan Wabah</option>
                        <option value="campaign">Kampanye Vaksinasi</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="content">Isi Pengumuman</label>
                    <textarea id="content" required></textarea>
                </div>
                <button type="submit" class="btn-primary">Publikasikan</button>
            </form>
        </div>
    </div>

    <div id="recordModal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('recordModal')">&times;</button>
            <h2 class="card-title" style="margin-bottom: 20px;">Input Rekam Medis</h2>
            <form id="recordForm">
                <div class="form-group">
                    <label>Pilih Pasien</label>
                    <select id="recordPatientSelect" required style="width: 100%; padding: 12px 15px; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border-color); border-radius: 10px; color: var(--text-primary);">
                        <option value="">Memuat data pasien...</option>
                    </select>
                    <input type="hidden" id="recordApptId">
                </div>
                <div class="form-group">
                    <label for="diagnosis">Diagnosis</label>
                    <textarea id="diagnosis" required></textarea>
                </div>
                <div class="form-group">
                    <label for="prescription">Resep Obat</label>
                    <textarea id="prescription" required></textarea>
                </div>
                <button type="submit" class="btn-primary">Simpan Rekam Medis</button>
            </form>
        </div>
    </div>

    <script src="/js/admin.js"></script>
</body>
</html>
